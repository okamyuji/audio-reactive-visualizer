<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Reactive Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
        color: #fff;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
      }
      #drop-zone {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        transition: opacity 0.3s;
      }
      #drop-zone.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #drop-zone h1 {
        font-size: 1.5rem;
        font-weight: 300;
        margin-bottom: 1rem;
        letter-spacing: 0.1em;
      }
      #drop-zone p {
        font-size: 0.85rem;
        opacity: 0.6;
      }
      #file-input {
        margin-bottom: 0.8rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="drop-zone">
      <h1>Audio Reactive Visualizer</h1>
      <input id="file-input" type="file" accept="audio/*" />
      <p>または音楽ファイルをドラッグ&ドロップ</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
